  <!-- ============================================================ -->
  <!-- Loading Screen Styles (shown before Flutter initializes)     -->
  <!-- ============================================================ -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0A0E21;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-overflow-scrolling: touch;
    }

    #flutter-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A0E21;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }

    #flutter-loading.hidden { opacity: 0; pointer-events: none; }

    .loading-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #2979FF, #448AFF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(41, 121, 255, 0.4);
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(41, 121, 255, 0.2);
      border-top-color: #2979FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    .loading-text {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- ============================================================ -->
  <!-- Native loading screen — hidden once Flutter is ready         -->
  <!-- ============================================================ -->
  <div id="flutter-loading">
    <div class="loading-logo">🎓</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Ibex Classroom</div>
  </div>

  <script>
    // Remove the loading screen once Flutter signals it is ready.
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('flutter-loading');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(function () { loader.remove(); }, 500);
      }
    });
  </script>

  <!--
    Flutter bootstrap script — initializes the Flutter engine.
    See: https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
