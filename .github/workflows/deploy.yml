# =============================================================================
# Ibex Classroom — GitHub Actions CI/CD Pipeline
# =============================================================================
# Triggers on every push to `main`.
# 1. Runs analysis + tests
# 2. Builds Flutter Web in release mode (with secrets from GitHub Secrets)
# 3. Deploys to Vercel (production)
#
# Required GitHub Secrets:
#   SUPABASE_URL        — your Supabase project URL
#   SUPABASE_ANON_KEY   — your Supabase anon/public key
#   VERCEL_TOKEN        — from https://vercel.com/account/tokens
#   VERCEL_ORG_ID       — from .vercel/project.json (run `vercel link` locally)
#   VERCEL_PROJECT_ID   — from .vercel/project.json (run `vercel link` locally)
# =============================================================================

name: 🚀 Build & Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.41.4"
  FLUTTER_CHANNEL: "stable"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Lint & Analyze ──────────────────────────────────────────────────
  analyze:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Get dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        run: flutter test --no-pub
        continue-on-error: true  # Don't block deploy if tests are WIP

  # ── Job 2: Build Web ───────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Flutter Web
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter Web (release)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          CLEAN_URL=$(echo -n "$SUPABASE_URL" | tr -d '\r\n')
          CLEAN_KEY=$(echo -n "$SUPABASE_ANON_KEY" | tr -d '\r\n')
          
          flutter build web \
            --release \
            --pwa-strategy=offline-first \
            --dart-define=SUPABASE_URL="$CLEAN_URL" \
            --dart-define=SUPABASE_ANON_KEY="$CLEAN_KEY" \
            --no-source-maps \
            --base-href "/"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web/
          retention-days: 1

  # ── Job 3: Deploy to Vercel ────────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on push to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/web/

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel deploy \
            --prod \
            --token="$VERCEL_TOKEN" \
            --yes \
            build/web/

      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Preview deployed to Vercel!** Check the deployment in Vercel dashboard.'
            })
